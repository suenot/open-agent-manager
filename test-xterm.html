<!DOCTYPE html>
<html>
<head>
  <title>xterm.js scroll test (app layout)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <style>
    body { margin: 0; background: #09090b; color: #e4e4e7; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }

    /* Mimics app sidebar */
    #sidebar { width: 250px; background: #09090b; border-right: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }

    /* Mimics app main area */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
    #tabs { height: 40px; background: #18181b; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; padding: 0 12px; font-size: 13px; color: #a1a1aa; }
    #terminal-area { flex: 1; display: flex; min-height: 0; position: relative; }

    /* Mimics absolute inset-0 terminal wrapper from App.tsx */
    #terminal-wrapper { position: absolute; inset: 0; display: block; z-index: 10; }

    /* Same CSS as the real app */
    .terminal-container {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
      padding-left: 12px;
    }
    .terminal-container .xterm { height: 100%; }
    .terminal-container .xterm .xterm-screen { user-select: text; -webkit-user-select: text; }
    .terminal-container .xterm .xterm-viewport { background-color: #09090b !important; }
    .xterm-viewport::-webkit-scrollbar { width: 10px; }
    .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }

    #log { position: fixed; bottom: 0; left: 0; right: 0; padding: 8px; font-family: monospace; font-size: 11px; color: #06b6d4; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.9); border-top: 1px solid #333; z-index: 100; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div style="padding: 20px; font-size: 10px; text-transform: uppercase; color: #52525b; font-weight: bold;">Active Projects</div>
  </div>
  <div id="main">
    <div id="tabs">claude</div>
    <div id="terminal-area">
      <div id="terminal-wrapper">
        <div id="container" class="terminal-container" style="background-color: #09090b;"></div>
      </div>
    </div>
  </div>
  <div id="log"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    const logEl = document.getElementById('log');
    const logs = [];
    function log(msg) {
      const ts = new Date().toISOString().slice(11,23);
      const line = '[' + ts + '] ' + msg;
      logs.push(line);
      const div = document.createElement('div');
      div.textContent = line;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    const terminal = new Terminal({
      cursorBlink: true,
      fontSize: 13,
      fontFamily: '"JetBrains Mono", Menlo, Monaco, monospace',
      scrollback: 10000,
      theme: { background: '#09090b', foreground: '#e4e4e7', cursor: '#3b82f6' },
      allowProposedApi: true,
      macOptionIsMeta: true,
      fontWeight: '500',
      letterSpacing: 0,
    });

    const fitAddon = new FitAddon.FitAddon();
    terminal.loadAddon(fitAddon);
    terminal.open(document.getElementById('container'));
    fitAddon.fit();

    // Write 500 lines
    for (var i = 1; i <= 500; i++) {
      terminal.writeln('Line ' + i + ': ' + '='.repeat(60) + ' content here');
    }
    terminal.writeln('\r\n\x1b[32m--- END OF CONTENT ---\x1b[0m');
    terminal.scrollToBottom();

    log('Init: cols=' + terminal.cols + ' rows=' + terminal.rows + ' baseY=' + terminal.buffer.active.baseY + ' viewportY=' + terminal.buffer.active.viewportY);

    // Scroll to middle
    var mid = Math.floor(terminal.buffer.active.baseY / 2);
    terminal.scrollToLine(mid);
    log('Scrolled to middle: viewportY=' + terminal.buffer.active.viewportY);

    terminal.onResize(function(e) {
      log('onResize: cols=' + e.cols + ' rows=' + e.rows + ' viewportY=' + terminal.buffer.active.viewportY);
    });

    // ResizeObserver — exact same as TerminalPane.tsx
    var resizeTimer = null;
    var resizeObserver = new ResizeObserver(function() {
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function() {
        var b = terminal.buffer.active;
        log('BEFORE fit: baseY=' + b.baseY + ' viewportY=' + b.viewportY + ' cols=' + terminal.cols);

        fitAddon.fit();

        b = terminal.buffer.active;
        log('AFTER fit: baseY=' + b.baseY + ' viewportY=' + b.viewportY + ' cols=' + terminal.cols);

        terminal.scrollToBottom();

        b = terminal.buffer.active;
        log('AFTER scrollToBottom: baseY=' + b.baseY + ' viewportY=' + b.viewportY);

        setTimeout(function() {
          var b2 = terminal.buffer.active;
          log('AFTER 200ms: baseY=' + b2.baseY + ' viewportY=' + b2.viewportY);
          if (b2.viewportY !== b2.baseY) {
            log('!!! DRIFT: viewportY=' + b2.viewportY + ' baseY=' + b2.baseY);
          } else {
            log('OK at bottom');
          }
        }, 200);
      }, 200);
    });
    resizeObserver.observe(document.getElementById('container'));

    window._terminal = terminal;
    window._fitAddon = fitAddon;
    window._getLogs = function() { return logs; };
  </script>
</body>
</html>
